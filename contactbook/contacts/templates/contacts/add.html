{% extends 'contacts/base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh; font-family: 'Inter', sans-serif;">
    <div style="background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; width: 100%; max-width: 400px;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="margin: 0; color: #111827; font-size: 1.5rem; font-weight: 700;">Create Contact</h2>
            <p style="color: #6b7280; font-size: 0.9rem; margin-top: 8px;">Fill in the details below to save a new connection.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 6px;">Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required
                    style="width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 1rem; outline: none; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='#4f46e5'; this.style.boxShadow='0 0 0 3px rgba(79, 70, 229, 0.1)'"
                    onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none'">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 6px;">Phone Number</label>
                <input type="text" name="phone" placeholder="+1 (555) 000-0000" required
                    style="width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 1rem; outline: none; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='#4f46e5'; this.style.boxShadow='0 0 0 3px rgba(79, 70, 229, 0.1)'"
                    onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none'">
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 6px;">Email Address</label>
                <input type="email" name="email" placeholder="john@example.com" required
                    style="width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 1rem; outline: none; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='#4f46e5'; this.style.boxShadow='0 0 0 3px rgba(79, 70, 229, 0.1)'"
                    onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none'">
            </div>

            <button type="submit" style="width: 100%; background-color: #4f46e5; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-bottom: 12px;"
                onmouseover="this.style.backgroundColor='#4338ca'"
                onmouseout="this.style.backgroundColor='#4f46e5'">
                Save Contact
            </button>
            
            <a href="/" style="display: block; text-align: center; color: #6b7280; text-decoration: none; font-size: 0.9rem; font-weight: 500;">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
